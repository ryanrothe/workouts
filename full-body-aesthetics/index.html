<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="FBA Tracker" />
<meta name="theme-color" content="#7c3aed" />
<link rel="manifest" href="../manifest.webmanifest" />
<link rel="apple-touch-icon" href="../icon-180.png" />
<link rel="icon" type="image/png" href="../favicon.png" />
<title>Full Body Aesthetics</title>
<link rel="stylesheet" href="../shared/styles.css" />
<style>
/* ─── FBA-specific ─────────────────────────────────────────────── */

/* Sticky sub-topbar sits below the shared appbar (appbar = env+55px) */
.fba-topbar {
  position: sticky;
  top: calc(env(safe-area-inset-top) + 55px);
  z-index: 49;
  background: rgba(255,255,255,0.94);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border);
}
.fba-topbar-inner {
  max-width: 720px; margin: 0 auto;
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
}
.crumbs { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.crumbs .phase { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; }
.crumbs .focus { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.pill-btn {
  appearance: none; border: 1px solid var(--border); background: var(--card);
  color: var(--text); height: 36px; padding: 0 12px; border-radius: 999px;
  font-size: 13.5px; font-weight: 600; cursor: pointer; font-family: inherit;
}
.pill-btn:active { background: var(--card-2); }
.icon-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--card);
  display: inline-flex; align-items: center; justify-content: center; cursor: pointer;
  color: var(--text);
}
.icon-btn:active { background: var(--card-2); }
.icon-btn svg { width: 18px; height: 18px; }

/* Day chips */
.day-nav {
  display: flex; gap: 6px; padding: 4px 14px 12px;
  max-width: 720px; margin: 0 auto;
  overflow-x: auto; scrollbar-width: none;
}
.day-nav::-webkit-scrollbar { display: none; }
.day-chip {
  flex: 0 0 auto; height: 32px; padding: 0 13px;
  border-radius: 999px; border: 1px solid var(--border);
  background: var(--card); color: var(--muted);
  font-size: 12.5px; font-weight: 600; cursor: pointer;
  display: inline-flex; align-items: center; gap: 5px;
  white-space: nowrap; font-family: inherit;
}
.day-chip.active { background: var(--primary); border-color: var(--primary); color: white; }
.day-chip .dot { width: 6px; height: 6px; border-radius: 50%; background: #c8cdd6; }
.day-chip.active .dot { background: white; }
.day-chip.done .dot { background: var(--success); }
.day-chip.rest { opacity: 0.45; cursor: default; }

/* Main */
main { padding: 12px 14px 100px; max-width: 720px; margin: 0 auto; }

/* Hero */
.hero {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 8px; margin-bottom: 16px;
}
.stat {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 6px;
  text-align: center; box-shadow: var(--shadow);
}
.stat-num { font-size: 18px; font-weight: 800; color: var(--primary); font-variant-numeric: tabular-nums; }
.stat-label { font-size: 9.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; margin-top: 2px; }

/* Progress bar */
.week-progress {
  height: 5px; background: var(--border-soft); border-radius: 99px; overflow: hidden;
  margin-bottom: 16px;
}
.week-progress > div { height: 100%; background: linear-gradient(90deg, var(--primary), #a78bfa); transition: width .25s; }

/* Day header */
.day-header { margin: 0 0 12px; }
.day-header h2 { font-size: 21px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 2px; }
.day-header .day-sublabel { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
.day-header .done-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--success-soft); color: var(--success);
  border: 1px solid var(--success-line);
  border-radius: 999px; padding: 2px 9px; font-size: 11px; font-weight: 700;
  margin-left: 8px; vertical-align: middle;
}
.workout-type {
  display: inline-block; background: var(--primary-soft); color: var(--primary);
  border: 1px solid var(--primary-line); border-radius: 999px;
  padding: 2px 9px; font-size: 10.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px;
}

/* Exercise cards */
.ex-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px; margin: 0 0 10px;
  box-shadow: var(--shadow);
}
.ex-card.done-card { opacity: 0.72; }
.ex-head { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
.ex-group-badge {
  flex: 0 0 auto; height: 22px; padding: 0 8px;
  border-radius: 999px; border: 1px solid; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em;
  display: flex; align-items: center;
}
.ex-name { flex: 1; font-size: 16px; font-weight: 700; line-height: 1.3; }
.ex-prescription { font-size: 12.5px; color: var(--muted); margin-bottom: 10px; line-height: 1.4; }

/* Set rows */
.sets { display: flex; flex-direction: column; gap: 6px; }
.set-row {
  display: grid; grid-template-columns: 30px 1fr 44px; gap: 8px;
  align-items: center;
}
.set-num {
  text-align: center; font-size: 11px; font-weight: 700; color: var(--muted);
  background: var(--card-2); border: 1px solid var(--border-soft); border-radius: 8px;
  height: 44px; display: flex; align-items: center; justify-content: center;
}
.set-weight {
  width: 100%; height: 44px; padding: 0 10px;
  background: var(--card-2); border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-size: 16px; font-family: inherit;
  -webkit-appearance: none; appearance: none;
}
.set-weight::placeholder { color: var(--muted); }
.set-weight:focus { outline: none; border-color: var(--primary); }
.check-btn {
  width: 44px; height: 44px; border-radius: 10px;
  border: 1.5px solid var(--border); background: var(--card-2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--muted); transition: background .12s, border-color .12s;
}
.check-btn svg { width: 18px; height: 18px; stroke-width: 2.5; }
.check-btn.checked { background: var(--success); border-color: var(--success); color: white; }
.set-row.done-row .set-weight { opacity: 0.5; }

/* Timer button */
.timer-btn {
  margin-top: 10px; height: 36px; padding: 0 14px;
  border-radius: 999px; border: 1px solid var(--border); background: var(--card-2);
  font-size: 12.5px; font-weight: 600; color: var(--muted); cursor: pointer;
  font-family: inherit; display: inline-flex; align-items: center; gap: 5px;
}
.timer-btn.running { background: var(--primary-soft); border-color: var(--primary-line); color: var(--primary); }
.timer-btn.done { background: var(--success-soft); border-color: var(--success-line); color: var(--success); }

/* Notes input on exercise card */
.ex-notes-input {
  margin-top: 8px; width: 100%; min-height: 36px; padding: 8px 10px;
  background: var(--card-2); border: 1px solid var(--border-soft); border-radius: 10px;
  font-size: 13px; font-family: inherit; color: var(--text);
  resize: vertical; box-sizing: border-box;
}
.ex-notes-input:focus { outline: none; border-color: var(--primary); }
.ex-notes-input::placeholder { color: var(--muted); }

/* Conditioning day */
.cond-text {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px; margin-bottom: 12px; box-shadow: var(--shadow);
  white-space: pre-wrap; font-size: 13.5px; color: var(--text-body); line-height: 1.6;
}
.cond-notes-wrap { margin-bottom: 12px; }
.cond-notes-wrap label { font-size: 11.5px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 6px; }
.cond-notes {
  width: 100%; min-height: 80px; padding: 10px 12px;
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 14px; font-family: inherit; color: var(--text);
  resize: vertical; box-sizing: border-box; box-shadow: var(--shadow);
}
.cond-notes:focus { outline: none; border-color: var(--primary); }
.cond-notes::placeholder { color: var(--muted); }

/* Done / mark-done button */
.mark-done-btn {
  width: 100%; height: 48px; border-radius: var(--radius);
  border: 1.5px solid var(--primary); background: var(--primary);
  color: white; font-size: 15px; font-weight: 700; cursor: pointer;
  font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 6px;
  margin-bottom: 10px;
}
.mark-done-btn.undone { background: var(--card); color: var(--primary); }
.mark-done-btn svg { width: 16px; height: 16px; stroke-width: 2.5; }

/* Rest day */
.rest-card {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 32px 16px; text-align: center; box-shadow: var(--shadow); margin: 8px 0 16px;
}
.rest-card .rest-icon { font-size: 36px; margin-bottom: 8px; }
.rest-card h3 { font-size: 18px; font-weight: 700; margin: 0 0 4px; }
.rest-card p { font-size: 13px; color: var(--muted); margin: 0; }

/* Links */
.links-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.vid-link {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--card-2); border: 1px solid var(--border); border-radius: 999px;
  padding: 5px 11px; font-size: 12px; font-weight: 600; color: var(--text);
  text-decoration: none; cursor: pointer;
}
.vid-link:active { background: var(--card); }
.vid-link svg { width: 13px; height: 13px; color: var(--primary); }

/* Bottom rest timer bar */
.rest-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  z-index: 60; transform: translateY(100%); transition: transform .25s;
}
.rest-bar.visible { transform: translateY(0); }
.rest-time { font-size: 28px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--primary); min-width: 64px; }
.rest-desc { flex: 1; font-size: 12px; color: var(--muted); }
.rest-bar-btn {
  height: 36px; padding: 0 14px; border-radius: 999px;
  border: 1px solid var(--border); background: var(--card);
  font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
}

/* Modal */
.modal-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.35); z-index: 100;
  align-items: flex-end;
}
.modal-backdrop.visible { display: flex; }
.modal {
  background: var(--card); border-radius: 20px 20px 0 0;
  width: 100%; max-height: 80vh; overflow-y: auto;
  padding: 20px 16px calc(20px + env(safe-area-inset-bottom));
  box-shadow: 0 -4px 32px rgba(0,0,0,0.12);
}
.modal h3 { font-size: 18px; font-weight: 800; margin: 0 0 14px; }
.modal-close { float: right; cursor: pointer; color: var(--muted); font-size: 22px; line-height: 1; margin-top: -2px; }

/* Week picker grid */
.week-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 8px; }
.wk-chip {
  aspect-ratio: 1; border-radius: 10px; border: 1px solid var(--border);
  background: var(--card-2); font-size: 12px; font-weight: 700; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; font-family: inherit; color: var(--text);
  position: relative; overflow: hidden;
}
.wk-chip .wk-fill {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--primary-soft); transition: height .2s;
}
.wk-chip .wk-num { position: relative; z-index: 1; }
.wk-chip .wk-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border); position: relative; z-index: 1; }
.wk-chip.active { border-color: var(--primary); background: var(--primary-soft); }
.wk-chip.active .wk-num { color: var(--primary); }
.wk-chip.all-done { background: var(--success-soft); border-color: var(--success-line); }
.wk-chip.all-done .wk-dot { background: var(--success); }

/* Cycle separator in week grid */
.cycle-label {
  grid-column: 1 / -1;
  font-size: 10px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.08em;
  padding-top: 8px;
}

/* Menu list */
.menu-list { list-style: none; padding: 0; margin: 0; }
.menu-list li { border-bottom: 1px solid var(--border); }
.menu-list li:last-child { border-bottom: none; }
.menu-list button {
  width: 100%; text-align: left; padding: 14px 2px;
  background: none; border: none; font-size: 15px; font-family: inherit; cursor: pointer; color: var(--text);
}
.menu-list button:active { color: var(--primary); }

/* Toast */
.toast {
  position: fixed; bottom: calc(72px + env(safe-area-inset-bottom));
  left: 50%; transform: translateX(-50%) translateY(16px);
  background: var(--text); color: white; border-radius: 999px;
  padding: 8px 18px; font-size: 13.5px; font-weight: 600;
  opacity: 0; transition: opacity .2s, transform .2s; z-index: 200;
  white-space: nowrap; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Muscle group badge colors */
.mg-legs      { color: #16a34a; border-color: #bbf7d0; background: #f0fdf4; }
.mg-chest     { color: #ea580c; border-color: #fed7aa; background: #fff7ed; }
.mg-back      { color: #2563eb; border-color: #bfdbfe; background: #eff6ff; }
.mg-shoulders { color: #d97706; border-color: #fde68a; background: #fffbeb; }
.mg-biceps    { color: #db2777; border-color: #fbcfe8; background: #fdf2f8; }
.mg-bicep     { color: #db2777; border-color: #fbcfe8; background: #fdf2f8; }
.mg-triceps   { color: #0d9488; border-color: #99f6e4; background: #f0fdfa; }
.mg-tricep    { color: #0d9488; border-color: #99f6e4; background: #f0fdfa; }
.mg-abs       { color: #6b7280; border-color: #e5e7eb; background: #f9fafb; }
.mg-core      { color: #6b7280; border-color: #e5e7eb; background: #f9fafb; }
.mg-glutes    { color: #7c3aed; border-color: #ddd6fe; background: #f5f3ff; }
.mg-default   { color: #7c3aed; border-color: #ddd6fe; background: #f5f3ff; }
</style>
</head>
<body data-program="full-body-aesthetics">

<header class="appbar">
  <div class="appbar-inner">
    <a class="appbar-back" href="../" aria-label="Back to Exercise Library">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="10 3 5 8 10 13"/></svg>
      Library
    </a>
    <div class="appbar-title">
      <div class="eyebrow">Program</div>
      <div class="name">Full Body Aesthetics</div>
    </div>
  </div>
  <div class="appbar-accent"></div>
</header>

<div class="fba-topbar">
  <div class="fba-topbar-inner">
    <button class="icon-btn" id="btnPickWeek" aria-label="Pick week">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <div class="crumbs">
      <div class="phase" id="weekLabel">—</div>
      <div class="focus" id="dayLabel">—</div>
    </div>
    <button class="icon-btn" id="btnMenu" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="6" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="18" r="1.5"/></svg>
    </button>
  </div>
  <div class="day-nav" id="dayNav"></div>
</div>

<main id="main"></main>

<div class="rest-bar" id="restBar">
  <div class="rest-time" id="restTime">1:00</div>
  <div class="rest-desc" id="restDesc">Rest</div>
  <button class="rest-bar-btn" id="restAdd">+30s</button>
  <button class="rest-bar-btn" id="restStop">Stop</button>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modal"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   Full Body Aesthetics Tracker — Ryan Fischer program
   Static PWA, data from data.json, state in localStorage.
   Key: fba_v1
   ============================================================ */

const STORAGE_KEY = 'fba_v1';
let PROGRAM = null;
let STATE = null;

/* ── storage ───────────────────────────────────────────────── */
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { currentWeek: 'w1', currentDay: 'Monday', logs: {} };
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE)); } catch(e) {}
}

/* ── helpers ───────────────────────────────────────────────── */
const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
function el(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  for (const k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else if (k.startsWith('on')) e[k] = attrs[k];
    else e.setAttribute(k, attrs[k]);
  }
  children.forEach(c => { if (c != null) { if (typeof c === 'string') e.appendChild(document.createTextNode(c)); else e.appendChild(c); } });
  return e;
}

function currentWeek() { return PROGRAM.weeks.find(w => w.id === STATE.currentWeek) || PROGRAM.weeks[0]; }
function currentDay() {
  const w = currentWeek();
  const d = w.days.find(d => d.day === STATE.currentDay);
  return d || w.days.find(d => !d.rest) || w.days[0];
}
function logKey(weekId, dayName) { return `${weekId}_${dayName}`; }
function getLog(weekId, dayName) { return STATE.logs[logKey(weekId, dayName)] || {}; }
function setLog(weekId, dayName, data) {
  STATE.logs[logKey(weekId, dayName)] = data;
  saveState();
}

function dayDone(weekId, day) {
  if (day.rest) return false;
  const log = getLog(weekId, day.day);
  return !!log.done;
}

function weekProgress(week) {
  const trainingDays = week.days.filter(d => !d.rest);
  if (!trainingDays.length) return 0;
  const done = trainingDays.filter(d => dayDone(week.id, d)).length;
  return done / trainingDays.length;
}

function totalDone() {
  return PROGRAM.weeks.reduce((acc, w) => {
    return acc + w.days.filter(d => !d.rest && dayDone(w.id, d)).length;
  }, 0);
}
function totalTraining() {
  return PROGRAM.weeks.reduce((acc, w) => acc + w.days.filter(d => !d.rest).length, 0);
}

/* ── group badge CSS class ─────────────────────────────────── */
function groupClass(group) {
  const key = (group || '').toLowerCase().replace(/\s+/g, '');
  const known = ['legs','chest','back','shoulders','biceps','bicep','triceps','tricep','abs','core','glutes'];
  return known.includes(key) ? `mg-${key}` : 'mg-default';
}

/* ── render ────────────────────────────────────────────────── */
function render() {
  renderTopbar();
  renderHero();
  renderDayContent();
}

function renderTopbar() {
  const w = currentWeek();
  const d = currentDay();
  $('#weekLabel').textContent = w.label;
  const typeText = d.rest ? 'Rest Day' : (d.type || 'Metcon');
  $('#dayLabel').textContent = `${d.day} · ${typeText}`;
  renderDayNav();
}

function renderDayNav() {
  const w = currentWeek();
  const nav = $('#dayNav');
  nav.innerHTML = '';
  w.days.forEach(d => {
    const done = dayDone(w.id, d);
    const isActive = d.day === STATE.currentDay;
    const chip = el('button', {
      class: `day-chip${isActive ? ' active' : ''}${done ? ' done' : ''}${d.rest ? ' rest' : ''}`,
      onclick: () => {
        if (d.rest) return;
        STATE.currentDay = d.day;
        saveState();
        render();
        $('#main').scrollTo ? $('#main').scrollTo(0,0) : (window.scrollY = 0);
        window.scrollTo(0,0);
      }
    },
      el('span', {class:'dot'}),
      d.day.slice(0,3)
    );
    nav.appendChild(chip);
  });
}

function renderHero() {
  const w = currentWeek();
  const prog = weekProgress(w);
  const trainingThisWeek = w.days.filter(d => !d.rest).length;
  const doneThisWeek = w.days.filter(d => !d.rest && dayDone(w.id, d)).length;
  const allDone = totalDone();
  const allTraining = totalTraining();
  const pct = allTraining ? Math.round(allDone / allTraining * 100) : 0;

  const main = $('#main');
  main.innerHTML = '';

  const hero = el('div', {class:'hero'},
    el('div', {class:'stat'}, el('div', {class:'stat-num'}, String(w.week)), el('div', {class:'stat-label'}, 'Week')),
    el('div', {class:'stat'}, el('div', {class:'stat-num'}, `${doneThisWeek}/${trainingThisWeek}`), el('div', {class:'stat-label'}, 'This Wk')),
    el('div', {class:'stat'}, el('div', {class:'stat-num'}, String(allDone)), el('div', {class:'stat-label'}, 'Days Done')),
    el('div', {class:'stat'}, el('div', {class:'stat-num'}, `${pct}%`), el('div', {class:'stat-label'}, 'Overall'))
  );
  main.appendChild(hero);

  const progressBar = el('div', {class:'week-progress'}, el('div', {style:`width:${Math.round(prog*100)}%`}));
  main.appendChild(progressBar);
}

function renderDayContent() {
  const w = currentWeek();
  const d = currentDay();
  const main = $('#main');

  const wrapper = el('div', {});

  // Day header
  const log = getLog(w.id, d.day);
  const isDone = !!log.done;
  const h2 = el('h2', {}, d.day);
  if (isDone) h2.appendChild(el('span', {class:'done-badge', html:'<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 8l4 4 6-8"/></svg>&nbsp;Done'}));
  const header = el('div', {class:'day-header'}, h2);
  if (d.dayLabel && !d.rest) {
    header.appendChild(el('div', {class:'day-sublabel'}, d.dayLabel));
  }
  wrapper.appendChild(header);

  if (d.rest) {
    wrapper.appendChild(el('div', {class:'rest-card'},
      el('div', {class:'rest-icon'}, '💤'),
      el('h3', {}, 'Rest Day'),
      el('p', {}, 'Recover, hydrate, and get ready for tomorrow.')
    ));
  } else if (!d.conditioning && d.exercises && d.exercises.length >= 2) {
    renderStructured(w, d, wrapper, log);
  } else {
    renderConditioning(w, d, wrapper, log);
  }

  main.appendChild(wrapper);
}

/* ── structured day ────────────────────────────────────────── */
function renderStructured(w, d, wrapper, log) {
  if (d.type) wrapper.appendChild(el('div', {class:'workout-type'}, d.type));

  d.exercises.forEach((ex, exIdx) => {
    const exLog = (log.exercises || {})[exIdx] || {};
    const allChecked = Array.from({length: ex.sets}, (_, i) => !!(exLog[`s${i}`]));
    const exDone = ex.sets > 0 && allChecked.every(Boolean);

    const card = el('div', {class:`ex-card${exDone ? ' done-card' : ''}`});

    // Head: badge + name
    const badge = el('span', {class:`ex-group-badge ${groupClass(ex.group)}`}, ex.group);
    const nameEl = el('div', {class:'ex-name'}, ex.name);
    card.appendChild(el('div', {class:'ex-head'}, badge, nameEl));

    if (ex.prescription) card.appendChild(el('div', {class:'ex-prescription'}, ex.prescription));

    // Set rows
    const setsEl = el('div', {class:'sets'});
    for (let i = 0; i < ex.sets; i++) {
      const checked = !!exLog[`s${i}`];
      const weight = exLog[`w${i}`] || '';

      const weightInput = el('input', {
        type:'text', inputmode:'decimal', placeholder:'lb', class:'set-weight',
        value: weight
      });
      weightInput.addEventListener('input', e => {
        ensureExLog(w.id, d.day, exIdx)[`w${i}`] = e.target.value;
        saveState();
      });

      const checkBtn = el('button', {class:`check-btn${checked ? ' checked' : ''}`, 'aria-label':'Mark set done'});
      checkBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 12l5 5 9-12"/></svg>';
      checkBtn.addEventListener('click', () => {
        const exL = ensureExLog(w.id, d.day, exIdx);
        exL[`s${i}`] = !exL[`s${i}`];
        if (exL[`s${i}`]) {
          startRestTimer(`${w.id}_${d.day}_${exIdx}_${i}`, null);
        } else {
          cancelRestTimer(`${w.id}_${d.day}_${exIdx}_${i}`);
        }
        saveState();
        render();
      });

      const row = el('div', {class:`set-row${checked ? ' done-row' : ''}`},
        el('div', {class:'set-num'}, String(i+1)),
        weightInput,
        checkBtn
      );
      setsEl.appendChild(row);
    }
    card.appendChild(setsEl);

    // Notes
    const notesInput = el('textarea', {class:'ex-notes-input', placeholder:'Notes…', rows:'1'});
    notesInput.value = exLog.notes || '';
    notesInput.addEventListener('input', e => {
      ensureExLog(w.id, d.day, exIdx).notes = e.target.value;
      saveState();
    });
    card.appendChild(notesInput);

    // Timer
    const timerKey = `${w.id}_${d.day}_${exIdx}`;
    const timerBtn = el('button', {class:'timer-btn', 'data-timer':timerKey}, '⏱ 60s');
    timerBtn.addEventListener('click', () => {
      ensureAudio();
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      if (activeTimers[timerKey]) {
        cancelRestTimer(timerKey);
      } else {
        startRestTimer(timerKey, timerBtn);
      }
    });
    reattachTimer(timerKey, timerBtn);
    card.appendChild(timerBtn);

    // Video links
    if (d.links && d.links.length) {
      const linksRow = el('div', {class:'links-row'});
      d.links.forEach((url, li) => {
        const a = el('a', {class:'vid-link', href:url, target:'_blank', rel:'noopener',
          html:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21"/></svg>'});
        a.appendChild(document.createTextNode(` Video ${d.links.length > 1 ? li+1 : ''}`));
        linksRow.appendChild(a);
      });
      card.appendChild(linksRow);
    }

    wrapper.appendChild(card);
  });

  appendMarkDoneBtn(w, d, wrapper, log);
}

/* ── conditioning day ──────────────────────────────────────── */
function renderConditioning(w, d, wrapper, log) {
  if (d.type) wrapper.appendChild(el('div', {class:'workout-type'}, d.type));

  // Workout text
  const raw = d.notes || '';
  if (raw) {
    const textBlock = el('div', {class:'cond-text'});
    textBlock.textContent = raw;
    wrapper.appendChild(textBlock);
  }

  // Video links
  if (d.links && d.links.length) {
    const linksRow = el('div', {class:'links-row', style:'margin-bottom:12px'});
    d.links.forEach((url, li) => {
      const a = el('a', {class:'vid-link', href:url, target:'_blank', rel:'noopener',
        html:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21"/></svg>'});
      a.appendChild(document.createTextNode(` Video ${d.links.length > 1 ? li+1 : ''}`));
      linksRow.appendChild(a);
    });
    wrapper.appendChild(linksRow);
  }

  // Notes
  const notesWrap = el('div', {class:'cond-notes-wrap'},
    el('label', {}, 'Notes / weights used')
  );
  const notesTA = el('textarea', {class:'cond-notes', placeholder:'e.g. used 35 lb DBs, finished in 22 min…', rows:'3'});
  notesTA.value = log.notes || '';
  notesTA.addEventListener('input', e => {
    const l = getLog(w.id, d.day);
    l.notes = e.target.value;
    setLog(w.id, d.day, l);
  });
  notesWrap.appendChild(notesTA);
  wrapper.appendChild(notesWrap);

  appendMarkDoneBtn(w, d, wrapper, log);
}

/* ── shared mark-done button ───────────────────────────────── */
function appendMarkDoneBtn(w, d, wrapper, log) {
  const isDone = !!log.done;
  const btn = el('button', {class:`mark-done-btn${isDone ? ' undone' : ''}`,
    html: isDone
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12l5 5 9-12"/></svg> Mark as Not Done'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12l5 5 9-12"/></svg> Mark as Done'
  });
  btn.addEventListener('click', () => {
    const l = getLog(w.id, d.day);
    l.done = !l.done;
    if (!l.date) l.date = new Date().toISOString().slice(0,10);
    setLog(w.id, d.day, l);
    toast(l.done ? 'Day complete! 🎉' : 'Unmarked');
    render();
  });
  wrapper.appendChild(btn);
}

/* ── exercise log helpers ──────────────────────────────────── */
function ensureExLog(weekId, dayName, exIdx) {
  const key = logKey(weekId, dayName);
  if (!STATE.logs[key]) STATE.logs[key] = {};
  const log = STATE.logs[key];
  if (!log.exercises) log.exercises = {};
  if (!log.exercises[exIdx]) log.exercises[exIdx] = {};
  return log.exercises[exIdx];
}

/* ── rest timer ────────────────────────────────────────────── */
const REST_SECONDS = 60;
const activeTimers = {};
let audioCtx = null;

function ensureAudio() {
  if (audioCtx) return audioCtx;
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) audioCtx = new AC();
  } catch(e) {}
  return audioCtx;
}
function beep() {
  const ctx = ensureAudio(); if (!ctx) return;
  const now = ctx.currentTime;
  [0, 0.18, 0.36].forEach((offset, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = i === 2 ? 1100 : 880;
    gain.gain.setValueAtTime(0, now + offset);
    gain.gain.linearRampToValueAtTime(0.25, now + offset + 0.01);
    gain.gain.linearRampToValueAtTime(0, now + offset + 0.14);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now + offset); osc.stop(now + offset + 0.16);
  });
  try { if (navigator.vibrate) navigator.vibrate([120, 80, 120, 80, 200]); } catch(e) {}
}
function fmtTime(s) {
  const m = Math.floor(s / 60), sec = Math.max(0, Math.floor(s % 60));
  return `${m}:${String(sec).padStart(2,'0')}`;
}
function startRestTimer(key, btn) {
  const endsAt = Date.now() + REST_SECONDS * 1000;
  if (btn) { btn.classList.add('running'); btn.textContent = fmtTime(REST_SECONDS); }
  $('#restBar').classList.add('visible');
  $('#restTime').textContent = fmtTime(REST_SECONDS);
  $('#restDesc').textContent = 'Rest';
  const intervalId = setInterval(() => {
    const t = activeTimers[key]; if (!t) return;
    const rem = (t.endsAt - Date.now()) / 1000;
    $('#restTime').textContent = fmtTime(rem);
    if (t.btn && t.btn.isConnected) t.btn.textContent = fmtTime(rem);
    if (rem <= 0) {
      clearInterval(t.intervalId);
      const b = t.btn;
      delete activeTimers[key];
      if (b && b.isConnected) { b.classList.remove('running'); b.classList.add('done'); b.textContent = 'Done!'; setTimeout(() => { if (b.isConnected) { b.classList.remove('done'); b.textContent = '⏱ 60s'; } }, 1800); }
      beep();
      setTimeout(() => { if (!Object.keys(activeTimers).length) $('#restBar').classList.remove('visible'); }, 1000);
    }
  }, 250);
  activeTimers[key] = { endsAt, intervalId, btn };
}
function cancelRestTimer(key) {
  const t = activeTimers[key]; if (!t) return;
  clearInterval(t.intervalId);
  const b = t.btn;
  delete activeTimers[key];
  if (b && b.isConnected) { b.classList.remove('running','done'); b.textContent = '⏱ 60s'; }
  if (!Object.keys(activeTimers).length) $('#restBar').classList.remove('visible');
}
function reattachTimer(key, btn) {
  const t = activeTimers[key];
  if (!t) return;
  t.btn = btn;
  if (btn) btn.classList.add('running');
}

$('#restAdd').addEventListener('click', () => {
  Object.values(activeTimers).forEach(t => { t.endsAt += 30000; });
});
$('#restStop').addEventListener('click', () => {
  Object.keys(activeTimers).forEach(cancelRestTimer);
  $('#restBar').classList.remove('visible');
});

/* ── modals ────────────────────────────────────────────────── */
function openModal(content) {
  const m = $('#modal');
  m.innerHTML = '';
  m.appendChild(content);
  $('#modalBackdrop').classList.add('visible');
}
function closeModal() { $('#modalBackdrop').classList.remove('visible'); }
$('#modalBackdrop').addEventListener('click', e => { if (e.target.id === 'modalBackdrop') closeModal(); });

function openWeekPicker() {
  const wrap = el('div', {});
  wrap.appendChild(el('span', {class:'modal-close', onclick: closeModal}, '×'));
  wrap.appendChild(el('h3', {}, 'Jump to Week'));

  const grid = el('div', {class:'week-grid'});
  let lastCycle = null;

  PROGRAM.weeks.forEach(w => {
    // Extract cycle from first day with a dayLabel
    let cycle = null;
    for (const d of w.days) {
      if (d.dayLabel) {
        const cm = d.dayLabel.match(/CYCLE\s*(\d+)/i);
        if (cm) { cycle = parseInt(cm[1]); break; }
      }
    }
    if (cycle && cycle !== lastCycle) {
      lastCycle = cycle;
      grid.appendChild(el('div', {class:'cycle-label'}, `Cycle ${cycle}`));
    }

    const prog = weekProgress(w);
    const allDone = prog >= 1;
    const chip = el('button', {
      class: `wk-chip${w.id === STATE.currentWeek ? ' active' : ''}${allDone ? ' all-done' : ''}`,
      onclick: () => {
        STATE.currentWeek = w.id;
        // Pick first non-rest day
        const firstTraining = w.days.find(d => !d.rest);
        if (firstTraining) STATE.currentDay = firstTraining.day;
        saveState(); render(); closeModal();
        window.scrollTo(0, 0);
      }
    });
    const fillH = Math.round(prog * 100);
    chip.appendChild(el('div', {class:'wk-fill', style:`height:${fillH}%`}));
    chip.appendChild(el('div', {class:'wk-num'}, String(w.week)));
    chip.appendChild(el('div', {class:'wk-dot'}));
    grid.appendChild(chip);
  });

  wrap.appendChild(grid);
  openModal(wrap);
}

function openMenu() {
  const wrap = el('div', {});
  wrap.appendChild(el('span', {class:'modal-close', onclick: closeModal}, '×'));
  wrap.appendChild(el('h3', {}, 'Menu'));
  const ul = el('ul', {class:'menu-list'});
  const items = [
    ['About this program', openAbout],
    ['Export backup', doExport],
    ['Import backup', doImport],
    ['Reset all data', doReset],
  ];
  items.forEach(([label, fn]) => {
    const btn = el('button', {onclick: () => { closeModal(); fn(); }}, label);
    ul.appendChild(el('li', {}, btn));
  });
  wrap.appendChild(ul);
  openModal(wrap);
}

function openAbout() {
  openModal(el('div', {},
    el('span', {class:'modal-close', onclick: closeModal}, '×'),
    el('h3', {}, 'About'),
    el('div', {style:'font-size:14px;line-height:1.6;color:var(--text-body)',
      html: `<p><strong>Full Body Aesthetics</strong> by Ryan Fischer (RyFischer.com)</p><p>64-week DB-based full body program. 5–6 training days per week, cycling through strength, hypertrophy, and conditioning blocks.</p><p>Your logs are saved in this browser's local storage. Use Export from the menu to save a backup.</p>`
    })
  ));
}

/* ── export / import / reset ───────────────────────────────── */
function doExport() {
  const payload = { app:'fba', version:1, exportedAt:new Date().toISOString(), state:STATE };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `fba-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast('Backup downloaded');
}
function doImport() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json,application/json';
  inp.onchange = () => {
    const f = inp.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const obj = JSON.parse(r.result);
        if (obj && obj.state) {
          if (!confirm('Replace current data with this backup?')) return;
          STATE = obj.state; saveState(); render(); toast('Import complete');
        } else { alert("Doesn't look like a valid backup."); }
      } catch(e) { alert('Could not read file: ' + e.message); }
    };
    r.readAsText(f);
  };
  inp.click();
}
function doReset() {
  if (!confirm('Delete all your logged data? This cannot be undone.')) return;
  STATE = { currentWeek:'w1', currentDay:'Monday', logs:{} };
  saveState(); render(); toast('Data cleared');
}

/* ── toast ─────────────────────────────────────────────────── */
let toastTimeout = null;
function toast(msg) {
  const el = $('#toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimeout) clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => el.classList.remove('show'), 2200);
}

/* ── init ──────────────────────────────────────────────────── */
$('#btnPickWeek').addEventListener('click', openWeekPicker);
$('#btnMenu').addEventListener('click', openMenu);

async function init() {
  STATE = loadState();
  try {
    const res = await fetch('data.json', { cache: 'no-store' });
    PROGRAM = await res.json();
  } catch(e) {
    document.body.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text)">Could not load program data. Make sure data.json is next to index.html.</div>';
    return;
  }
  // Validate state
  if (!PROGRAM.weeks.find(w => w.id === STATE.currentWeek)) {
    STATE.currentWeek = PROGRAM.weeks[0].id;
  }
  const w = currentWeek();
  const validDay = w.days.find(d => d.day === STATE.currentDay && !d.rest);
  if (!validDay) {
    const first = w.days.find(d => !d.rest);
    if (first) STATE.currentDay = first.day;
  }
  saveState();
  render();
}
init();
</script>
